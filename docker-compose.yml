version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: spring-security-jwt-demo-postgres
    restart: always
    environment:
      POSTGRES_DB: spring_security_jwt_bd
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 1234
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
